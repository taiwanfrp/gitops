apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: taiwanfrp-backend-scaler
  namespace: taiwanfrp-ns
spec:
  scaleTargetRef:
    name: taiwanfrp-backend
    kind: Deployment
    apiVersion: apps/v1

  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 300

  advanced:
    restoreToOriginalReplicaCount: true

  triggers:
  - type: cpu
    metricType: Utilization
    metadata:
      value: "70"